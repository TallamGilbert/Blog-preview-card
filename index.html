<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog Preview Card</title>
    <link rel="stylesheet" href="styles.css" />

   
  </head>
  <body>
    <div class="blog-card">
      <img
        class="blog-card__image"
        src="/assets/images/illustration-article.svg"
        alt="Blog Image"
      />
      <div class="blog-card__content">
        <span class="blog-card__category">Learning</span>
        <p class="blog-card__date">Published 21 Dec 2023</p>
        <h2 class="blog-card__title">HTML & CSS foundations</h3>
        <p class="blog-card__description">
          These languages are the backbone of every website, defining structure,
          content, and presentation.
        </p>
        <div class="blog-card__author-info">
          <img
            class="blog-card__author-image"
            src="/assets/images/image-avatar.webp"
            alt="Author Image"
          />
          <p class="blog-card__author">Greg Hooper</p>
        </div>
      </div>
    </div>
  </body>
</html>
